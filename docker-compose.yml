services:
  backend:
    build:
      context: ./backend
    environment:
      SAVEMONEY_DATABASE_URL: sqlite:////data/savemoney.db
      SAVEMONEY_ACCESS_TOKEN: ${SAVEMONEY_ACCESS_TOKEN:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
    ports:
      - "8000:8000"
    volumes:
      - savemoney-data:/data

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8000}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8000}
      NEXT_PUBLIC_SAVEMONEY_ACCESS_TOKEN: ${NEXT_PUBLIC_SAVEMONEY_ACCESS_TOKEN:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  savemoney-data:
